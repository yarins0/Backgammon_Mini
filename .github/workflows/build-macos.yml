name: Build macOS App

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag to upload to (e.g. v1.0.0)"
        required: true

permissions:
  contents: write  # Required to upload to GitHub Releases

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install pyinstaller

      - name: Build macOS app
        run: python -m PyInstaller packaging/macos.spec

      - name: Zip the app bundle
        run: zip -r BackgammonAI_macos.zip dist/BackgammonAI.app

      - name: Upload to GitHub Release
        run: gh release upload "${{ github.event.inputs.release_tag }}" BackgammonAI_macos.zip --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
